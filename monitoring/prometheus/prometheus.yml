global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'auth-service:8081'
          - 'user-service:8082'
          - 'lead-service:8083'
          - 'deal-service:8084'
          - 'email-service:8085'
          - 'notification-service:8086'
          - 'analytics-service:8087'
          - 'ai-service:8088'
