server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:crm-super-secret-key-must-be-at-least-32-chars!!}

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      # ── Global CORS ──────────────────────────────────────────────────────────
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [ GET, POST, PUT, DELETE, PATCH, OPTIONS ]
            allowedHeaders: "*"
            exposedHeaders: [ X-User-Id, X-User-Role ]

      # ── Default filters applied to every route ───────────────────────────────
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"

      # ── Routes ───────────────────────────────────────────────────────────────
      routes:

        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            # Auth endpoints get a tighter rate limit (brute-force protection)
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: lead-service
          uri: ${LEAD_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/leads/**
          filters:
            - StripPrefix=1

        - id: deal-service
          uri: ${DEAL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/deals/**
          filters:
            - StripPrefix=1

        - id: email-service
          uri: ${EMAIL_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/emails/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1

        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
            # AI endpoints are expensive — stricter rate limit
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
                key-resolver: "#{@userKeyResolver}"

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.crm.gateway: DEBUG
