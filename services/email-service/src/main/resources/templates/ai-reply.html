<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${subject}">AI Reply</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .header { background: #7c3aed; padding: 24px 32px; }
        .header h1 { color: #fff; margin: 0; font-size: 20px; }
        .body { padding: 32px; color: #333; line-height: 1.7; }
        .footer { background: #f4f4f4; padding: 16px 32px; font-size: 12px; color: #888; text-align: center; }
        .ai-badge { display: inline-block; background: #ede9fe; color: #7c3aed; font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="${subject}">Your Personalised Reply</h1>
    </div>
    <div class="body">
        <span class="ai-badge">AI-Generated</span>
        <p>Hi <span th:text="${recipientName ?: 'there'}">there</span>,</p>
        <div th:utext="${body}">AI generated email body.</div>
        <p>Warm regards,<br/>The CRM Team</p>
    </div>
    <div class="footer">
        <p>This email was generated with AI assistance.</p>
        <p>&copy; <span th:text="${#temporals.year(#temporals.createNow())}">2025</span> CRM Platform. All rights reserved.</p>
    </div>
</div>
</body>
</html>
