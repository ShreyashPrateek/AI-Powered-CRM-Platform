services:

  # ─── API Gateway ──────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: crm-api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-crm-super-secret-key-must-be-at-least-32-chars!!}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      LEAD_SERVICE_URL: http://lead-service:8083
      DEAL_SERVICE_URL: http://deal-service:8084
      EMAIL_SERVICE_URL: http://email-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      AI_SERVICE_URL: http://ai-service:8088
    depends_on:
      - redis
    networks:
      - crm-network

  # ─── Auth Service ──────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: crm-auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-crm-super-secret-key-must-be-at-least-32-chars!!}
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - crm-network

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    networks:
      - crm-network

  # ─── Elasticsearch ────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: crm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - crm-network

  # ─── Kibana ───────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: crm-kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - crm-network

  # ─── ChromaDB ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: crm-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - crm-network

  # ─── Kafka + Zookeeper ────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: crm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - crm-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: crm-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - crm-network

  # ─── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: crm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - crm-network

  # ─── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: crm-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_data:
  es_data:
  chroma_data:
  grafana_data:
