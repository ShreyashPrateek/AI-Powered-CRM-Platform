services:

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ─── Zookeeper ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: crm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_ADMIN_ENABLE_SERVER: "false"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - crm-network

  # ─── Kafka ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: crm-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - crm-network

  # ─── Elasticsearch ────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: crm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - crm-network

  # ─── Kibana ───────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: crm-kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - crm-network

  # ─── ChromaDB ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: crm-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - crm-network

  # ─── Auth Service ──────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: crm-auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-crm-super-secret-key-must-be-at-least-32-chars!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  # ─── User Service ──────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: crm-user-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  # ─── Lead Service ─────────────────────────────────────────
  lead-service:
    build: ./services/lead-service
    container_name: crm-lead-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      ES_HOST: elasticsearch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - crm-network

  # ─── Deal Service ─────────────────────────────────────────
  deal-service:
    build: ./services/deal-service
    container_name: crm-deal-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  # ─── Email Service ─────────────────────────────────────────
  email-service:
    build: ./services/email-service
    container_name: crm-email-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-noreply@crm.io}
      SMTP_PASS: ${SMTP_PASS:-changeme}
      AI_SERVICE_URL: http://ai-service:8088
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  # ─── Notification Service ──────────────────────────────────
  notification-service:
    build: ./services/notification-service
    container_name: crm-notification-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-changeme}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-changeme}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-+10000000000}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-noreply@crm.io}
      SMTP_PASS: ${SMTP_PASS:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  # ─── Analytics Service ────────────────────────────────────
  analytics-service:
    build: ./services/analytics-service
    container_name: crm-analytics-service
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_NAME: crm_db
      DB_USER: crm_user
      DB_PASS: crm_pass
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  # ─── API Gateway ──────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: crm-api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-crm-super-secret-key-must-be-at-least-32-chars!!}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      LEAD_SERVICE_URL: http://lead-service:8083
      DEAL_SERVICE_URL: http://deal-service:8084
      EMAIL_SERVICE_URL: http://email-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      AI_SERVICE_URL: http://ai-service:8088
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      lead-service:
        condition: service_started
      deal-service:
        condition: service_started
    networks:
      - crm-network

  # ─── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: crm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - crm-network

  # ─── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: crm-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_data:
  es_data:
  chroma_data:
  grafana_data:
